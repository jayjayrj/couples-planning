spring:
  application:
    name: couples-planning-api
  profiles:
    active: dev

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

app:
  upload:
    avatar-dir: uploads/avatars
    avatar-base-url: /uploads/avatars